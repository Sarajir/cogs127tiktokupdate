<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>抖音</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      overflow: hidden;
      height: 100vh; width: 100vw;
      display: flex; justify-content: center;
    }

    .app {
      width: 100%; max-width: 420px;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    /* ═══════════════════════════════
       HORIZONTAL SCREENS WRAPPER
    ═══════════════════════════════ */
    .screens-wrapper {
      display: flex;
      width: 200%;
      height: 100%;
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    .screens-wrapper.no-transition { transition: none; }

    .screen {
      width: 50%;    /* each screen = 100vw of app */
      height: 100%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════
       SWIPE EDGE HINT
    ═══════════════════════════════ */
    .swipe-hint {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      z-index: 300;
      display: flex; align-items: center; gap: 6px;
      background: rgba(0,0,0,.55);
      border-radius: 20px;
      padding: 8px 14px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      white-space: nowrap;
    }
    .swipe-hint.right-hint { right: 12px; }
    .swipe-hint.left-hint  { left: 12px; }
    .swipe-hint.visible    { opacity: 1; }

    /* ═══════════════════════════════
       SECTION PILL INDICATOR
    ═══════════════════════════════ */
    .section-pill {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      display: flex; gap: 6px;
      pointer-events: none;
    }
    .pill-dot {
      width: 6px; height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,.4);
      transition: width .25s, background .25s;
    }
    .pill-dot.active {
      width: 18px;
      background: #fff;
    }

    /* ═══════════════════════════════
       TOP NAV
    ═══════════════════════════════ */
    .top-nav {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 48px 16px 12px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(to bottom, rgba(0,0,0,.55) 0%, transparent 100%);
    }
    .top-nav .tab {
      font-size: 16px; color: rgba(255,255,255,.65);
      padding: 4px 14px; cursor: pointer;
      position: relative; transition: color .2s; letter-spacing: .5px;
    }
    .top-nav .tab.active {
      color: #fff; font-weight: 700; font-size: 17px;
    }
    .top-nav .tab.active::after {
      content: ''; position: absolute;
      bottom: -4px; left: 50%; transform: translateX(-50%);
      width: 20px; height: 2.5px;
      background: #fff; border-radius: 2px;
    }
    .top-nav .search-icon {
      position: absolute; right: 16px; top: 50%;
      transform: translateY(-30%); font-size: 22px; cursor: pointer;
    }
    .top-nav .live-btn {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-30%); font-size: 13px;
      border: 1px solid rgba(255,255,255,.7); border-radius: 4px;
      padding: 2px 7px; color: rgba(255,255,255,.85); cursor: pointer;
    }

    /* Secondary screen top nav */
    .sec-top-nav {
      position: absolute; top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 48px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 100%);
    }
    .sec-back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 15px; cursor: pointer;
      color: rgba(255,255,255,.9);
    }
    .sec-title {
      font-size: 17px; font-weight: 700;
    }
    .sec-more { font-size: 22px; cursor: pointer; }

    /* ═══════════════════════════════
       FEED (shared between both screens)
    ═══════════════════════════════ */
    .feed {
      width: 100%; height: 100%;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .feed::-webkit-scrollbar { display: none; }

    .video-card {
      width: 100%; height: 100vh;
      scroll-snap-align: start;
      position: relative; overflow: hidden;
    }

    .video-bg {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .video-bg video { width: 100%; height: 100%; object-fit: cover; }
    .video-placeholder {
      width: 100%; height: 100%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; position: relative;
    }
    .video-placeholder::after {
      content: ''; position: absolute; inset: 0;
      background: rgba(0,0,0,.18);
    }

    /* Actual uploaded video fill */
    .video-fill {
      width: 100%; height: 100%;
      object-fit: cover; background: #000;
    }

    .play-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10; opacity: 0; transition: opacity .25s; pointer-events: none;
    }
    .play-overlay.show { opacity: 1; }
    .play-icon {
      width: 72px; height: 72px;
      background: rgba(0,0,0,.45); border-radius: 50%;
      display: flex; align-items: center; justify-content: center; font-size: 32px;
    }

    /* ═══════════════════════════════
       VIDEO INFO OVERLAY
    ═══════════════════════════════ */
    .video-info {
      position: absolute; bottom: 80px; left: 0; right: 72px;
      padding: 0 16px; z-index: 20;
    }
    .user-name {
      font-size: 16px; font-weight: 700; margin-bottom: 6px;
      text-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
    .video-desc {
      font-size: 14px; line-height: 1.5; color: rgba(255,255,255,.92);
      text-shadow: 0 1px 4px rgba(0,0,0,.5); margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .video-desc span { color: #fe2c55; font-weight: 600; }
    .music-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: rgba(255,255,255,.9);
    }
    .music-row .note { font-size: 15px; animation: slide 4s linear infinite; }
    @keyframes slide { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }

    /* ═══════════════════════════════
       RIGHT ACTIONS
    ═══════════════════════════════ */
    .actions {
      position: absolute; right: 10px; bottom: 80px;
      display: flex; flex-direction: column; align-items: center; gap: 18px; z-index: 20;
    }
    .avatar-wrap { position: relative; margin-bottom: 4px; }
    .avatar {
      width: 46px; height: 46px; border-radius: 50%;
      border: 2px solid #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; overflow: hidden; background: var(--bg, #333); cursor: pointer;
    }
    .follow-btn {
      position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%);
      width: 18px; height: 18px; background: #fe2c55; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; cursor: pointer; line-height: 1;
    }
    .action-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; cursor: pointer;
    }
    .action-icon {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center; font-size: 30px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); transition: transform .15s;
    }
    .action-btn:active .action-icon { transform: scale(.85); }
    .action-btn.liked .action-icon { filter: drop-shadow(0 0 6px #fe2c55); }
    .action-count { font-size: 12px; font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,.6); }
    .vinyl {
      width: 44px; height: 44px; border-radius: 50%;
      background: #1a1a1a; border: 2px solid #333;
      display: flex; align-items: center; justify-content: center; font-size: 22px;
      animation: spin 4s linear infinite;
      box-shadow: 0 0 0 6px rgba(255,255,255,.06);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════
       BOTTOM NAV
    ═══════════════════════════════ */
    .bottom-nav {
      position: absolute; bottom: 0; left: 0; right: 0; height: 68px;
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
      padding-bottom: 8px;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; cursor: pointer; min-width: 50px;
    }
    .nav-icon { font-size: 24px; }
    .nav-label { font-size: 10px; color: rgba(255,255,255,.7); }
    .nav-item.active .nav-label { color: #fff; font-weight: 600; }
    .nav-item.active .nav-icon { filter: brightness(1.2); }
    .post-btn { width: 46px; height: 30px; position: relative; cursor: pointer; }
    .post-btn::before {
      content: ''; position: absolute; left: 0; top: 0;
      width: 32px; height: 30px; background: #25f4ee; border-radius: 8px;
    }
    .post-btn::after {
      content: ''; position: absolute; right: 0; top: 0;
      width: 32px; height: 30px; background: #fe2c55; border-radius: 8px;
    }
    .post-inner {
      position: absolute; left: 50%; top: 0; transform: translateX(-50%);
      width: 32px; height: 30px; background: #fff; border-radius: 8px; z-index: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #000; font-weight: 700;
    }

    /* ═══════════════════════════════
       HEART ANIMATION
    ═══════════════════════════════ */
    .heart-burst {
      position: absolute; pointer-events: none; z-index: 50;
      font-size: 60px; transform: translate(-50%, -50%) scale(0); opacity: 0;
    }
    .heart-burst.animate { animation: heartPop .7s ease-out forwards; }
    @keyframes heartPop {
      0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      50%  { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    /* ═══════════════════════════════
       COMMENTS SHEET
    ═══════════════════════════════ */
    .comments-sheet {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 420px; height: 68vh;
      background: #1a1a1a; border-radius: 16px 16px 0 0;
      z-index: 500; transition: transform .3s ease;
      display: flex; flex-direction: column;
    }
    .comments-sheet.open { transform: translateX(-50%) translateY(0); }
    .comments-sheet.open.on-top-of-cvfeed { z-index: 650; }

    .sheet-header {
      padding: 12px 16px; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .sheet-title { font-weight: 700; font-size: 15px; }
    .sheet-close { position: absolute; right: 16px; font-size: 20px; cursor: pointer; color: rgba(255,255,255,.6); }

    .comments-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .comments-list::-webkit-scrollbar { width: 3px; }
    .comments-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .comment-item { display: flex; gap: 10px; margin-bottom: 18px; }
    .comment-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0; background: #333;
    }
    .comment-body { flex: 1; min-width: 0; }
    .comment-name { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 3px; }
    .comment-text { font-size: 14px; line-height: 1.4; word-break: break-word; }
    .comment-footer { display: flex; gap: 16px; margin-top: 5px; align-items: center; }
    .comment-time { font-size: 11px; color: rgba(255,255,255,.35); }
    .comment-like { font-size: 11px; color: rgba(255,255,255,.4); cursor: pointer; }

    /* Video comment */
    .comment-video-wrap {
      margin-top: 8px;
      border-radius: 10px; overflow: hidden;
      position: relative; background: #000;
      max-width: 200px;
    }
    .comment-video-wrap video {
      width: 100%; max-height: 160px;
      object-fit: cover; display: block;
      border-radius: 10px;
    }
    .video-comment-badge {
      position: absolute; top: 6px; left: 6px;
      background: rgba(0,0,0,.6); border-radius: 4px;
      font-size: 10px; padding: 2px 6px; color: #fff;
    }
    .video-comment-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; pointer-events: none;
    }

    /* ═══════════════════════════════
       SHEET INPUT ROW
    ═══════════════════════════════ */
    .sheet-input {
      padding: 10px 16px 24px; border-top: 1px solid #2a2a2a;
      display: flex; gap: 8px; align-items: center;
    }
    .sheet-input input {
      flex: 1; background: #2a2a2a; border: none; outline: none;
      border-radius: 20px; padding: 10px 16px; color: #fff; font-size: 14px;
    }
    .sheet-input input::placeholder { color: rgba(255,255,255,.35); }

    .upload-video-btn {
      width: 36px; height: 36px; background: #2a2a2a; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; cursor: pointer; flex-shrink: 0;
      transition: background .15s;
    }
    .upload-video-btn:hover { background: #3a3a3a; }
    .upload-video-btn.uploading { background: #fe2c55; animation: pulse .8s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

    .send-btn {
      width: 36px; height: 36px; background: #fe2c55; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
    }

    /* ═══════════════════════════════
       VIDEO UPLOAD PREVIEW MODAL
    ═══════════════════════════════ */
    .video-preview-modal {
      position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,.85);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .25s;
    }
    .video-preview-modal.show { opacity: 1; pointer-events: all; }
    .video-preview-card {
      width: 100%; max-width: 420px;
      background: #1a1a1a; border-radius: 20px 20px 0 0;
      padding: 20px 16px 36px;
      transform: translateY(40px); transition: transform .3s ease;
    }
    .video-preview-modal.show .video-preview-card { transform: translateY(0); }
    .preview-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; text-align: center; }
    .preview-video-wrap {
      border-radius: 12px; overflow: hidden; background: #000;
      margin-bottom: 14px; max-height: 260px;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-video-wrap video { width: 100%; max-height: 260px; object-fit: contain; }
    .preview-caption-input {
      width: 100%; background: #2a2a2a; border: none; outline: none;
      border-radius: 12px; padding: 10px 14px; color: #fff; font-size: 14px;
      margin-bottom: 14px;
    }
    .preview-caption-input::placeholder { color: rgba(255,255,255,.3); }
    .preview-actions { display: flex; gap: 10px; }
    .preview-cancel {
      flex: 1; padding: 12px; border-radius: 12px;
      background: #2a2a2a; color: rgba(255,255,255,.7);
      text-align: center; font-size: 15px; cursor: pointer;
    }
    .preview-send {
      flex: 1; padding: 12px; border-radius: 12px;
      background: #fe2c55; color: #fff;
      text-align: center; font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* ═══════════════════════════════
       OVERLAY BG
    ═══════════════════════════════ */
    .overlay-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 490; display: none;
    }
    .overlay-bg.show { display: block; z-index: 490; }
    .overlay-bg.show.on-top-of-cvfeed { z-index: 640; }

    /* ═══════════════════════════════
       COMMENTS SHEET — swipe hint
    ═══════════════════════════════ */
    .sheet-swipe-row {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; padding: 0 16px 8px;
      font-size: 12px; color: rgba(255,255,255,.38);
      border-bottom: 1px solid #252525;
    }
    .sheet-swipe-row kbd {
      font-size: 10px; padding: 1px 5px; border-radius: 4px;
      background: #333; color: rgba(255,255,255,.55);
    }

    /* ═══════════════════════════════
       FULLSCREEN COMMENT-VIDEO FEED
       (only user-uploaded comment videos for this thread)
    ═══════════════════════════════ */
    #commentVideoFeedLayer {
      position: fixed; inset: 0; left: 50%; transform: translate(-50%, 100%);
      width: 100%; max-width: 420px; height: 100%;
      background: #000; z-index: 620;
      transition: transform .38s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #commentVideoFeedLayer.open {
      transform: translate(-50%, 0);
    }
    #commentVideoFeedLayer .cv-swipe-hint {
      position: absolute; top: 50%; left: 10px; transform: translateY(-50%);
      z-index: 300; font-size: 12px; color: rgba(255,255,255,.45);
      background: rgba(0,0,0,.45); padding: 8px 12px; border-radius: 16px;
      opacity: 0; pointer-events: none; transition: opacity .2s;
      white-space: nowrap;
    }
    #commentVideoFeedLayer .cv-swipe-hint.visible { opacity: 1; }

    .cv-feed-badge {
      font-size: 11px; color: rgba(255,255,255,.55);
      background: rgba(254,44,85,.25); padding: 3px 8px; border-radius: 4px;
      display: inline-block; margin-bottom: 6px;
    }

    .cv-empty-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(160deg,#1a1a2e,#2d132c);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px; text-align: center; gap: 12px;
    }
    .cv-empty-placeholder .big { font-size: 56px; opacity: .9; }
    .cv-empty-placeholder h2 { font-size: 18px; font-weight: 700; }
    .cv-empty-placeholder p { font-size: 14px; color: rgba(255,255,255,.55); line-height: 1.55; }

    .app.hide-section-pill .section-pill { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
<div class="app">

  <!-- Section dot indicators -->
  <div class="section-pill" id="sectionPill">
    <div class="pill-dot active" id="dot0"></div>
    <div class="pill-dot" id="dot1"></div>
  </div>

  <!-- Horizontal screens -->
  <div class="screens-wrapper" id="screensWrapper">

    <!-- ══════════ SCREEN 0: Main Feed ══════════ -->
    <div class="screen" id="screen0">
      <!-- swipe hint (right edge → go to secondary) -->
      <div class="swipe-hint right-hint" id="hint0">同款视频 →</div>

      <div class="top-nav">
        <div class="live-btn">直播</div>
        <div class="tab" onclick="switchTab(this)">关注</div>
        <div class="tab active" onclick="switchTab(this)">推荐</div>
        <div class="tab" onclick="switchTab(this)">朋友</div>
        <div class="search-icon" onclick="alert('搜索功能')">🔍</div>
      </div>

      <div class="feed" id="feed0"></div>

      <div class="bottom-nav">
        <div class="nav-item active" onclick="switchNav(this)">
          <div class="nav-icon">🏠</div><div class="nav-label">首页</div>
        </div>
        <div class="nav-item" onclick="switchNav(this)">
          <div class="nav-icon">🔍</div><div class="nav-label">搜索</div>
        </div>
        <div class="nav-item">
          <div class="post-btn" onclick="alert('发布视频')">
            <div class="post-inner">＋</div>
          </div>
        </div>
        <div class="nav-item" onclick="switchNav(this)">
          <div class="nav-icon">💬</div><div class="nav-label">消息</div>
        </div>
        <div class="nav-item" onclick="switchNav(this)">
          <div class="nav-icon">👤</div><div class="nav-label">我</div>
        </div>
      </div>
    </div>

    <!-- ══════════ SCREEN 1: Secondary Feed ══════════ -->
    <div class="screen" id="screen1">
      <!-- swipe hint (left edge → go back) -->
      <div class="swipe-hint left-hint" id="hint1">← 返回推荐</div>

      <div class="sec-top-nav">
        <div class="sec-back-btn" onclick="goToScreen(0)">‹ 推荐</div>
        <div class="sec-title">同款视频</div>
        <div class="sec-more">⋯</div>
      </div>

      <div class="feed" id="feed1"></div>

      <div class="bottom-nav">
        <div class="nav-item" onclick="switchNav(this)">
          <div class="nav-icon">🏠</div><div class="nav-label">首页</div>
        </div>
        <div class="nav-item active" onclick="switchNav(this)">
          <div class="nav-icon">🔍</div><div class="nav-label">搜索</div>
        </div>
        <div class="nav-item">
          <div class="post-btn" onclick="alert('发布视频')">
            <div class="post-inner">＋</div>
          </div>
        </div>
        <div class="nav-item" onclick="switchNav(this)">
          <div class="nav-icon">💬</div><div class="nav-label">消息</div>
        </div>
        <div class="nav-item" onclick="switchNav(this)">
          <div class="nav-icon">👤</div><div class="nav-label">我</div>
        </div>
      </div>
    </div>

  </div><!-- /screens-wrapper -->

  <!-- Comments Sheet (shared, fixed) -->
  <div class="overlay-bg" id="overlayBg" onclick="closeComments()"></div>
  <div class="comments-sheet" id="commentsSheet">
    <div class="sheet-header">
      <div class="sheet-title" id="commentCount">评论 128</div>

/* ═══════════════════════════════════════════════════
   HORIZONTAL SWIPE / SCREEN SWITCHING
═══════════════════════════════════════════════════ */
let touchStartX = 0, touchStartY = 0;
let swipeAxis = null;   // 'h' | 'v' | null
let dragging = false;
const SWIPE_THRESHOLD = 60;

const wrapper = document.getElementById('screensWrapper');

function goToScreen(idx) {
  currentScreen = idx;
  wrapper.classList.remove('no-transition');
  // wrapper is 200% wide; screen 0 → translateX(0), screen 1 → translateX(-50%)
  wrapper.style.transform = `translateX(${idx === 0 ? 0 : -50}%)`;
  updateDots();
}

function updateDots() {
  document.getElementById('dot0').classList.toggle('active', currentScreen === 0);
  document.getElementById('dot1').classList.toggle('active', currentScreen === 1);
}

// Attach touch listeners to both screens
['screen0','screen1'].forEach(sid => {
  const el = document.getElementById(sid);

  el.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    swipeAxis = null;
    dragging = false;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (document.getElementById('commentsSheet').classList.contains('open')) return;
    if (document.getElementById('commentVideoFeedLayer').classList.contains('open')) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;

    if (!swipeAxis) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        swipeAxis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }

    if (swipeAxis === 'h') {
      e.preventDefault();
      dragging = true;
      const base = currentScreen === 0 ? 0 : -50;
      // percentage offset relative to wrapper width (wrapper = 200vw)
      const pct = (dx / (wrapper.parentElement.offsetWidth * 2)) * 100;
      wrapper.classList.add('no-transition');
      wrapper.style.transform = `translateX(${base + pct}%)`;

      // show hints
      const hint0 = document.getElementById('hint0');
      const hint1 = document.getElementById('hint1');
      if (currentScreen === 0 && dx < -10) hint0.classList.add('visible');
      else hint0.classList.remove('visible');
      if (currentScreen === 1 && dx > 10) hint1.classList.add('visible');
      else hint1.classList.remove('visible');
    }
  }, { passive: false });

  el.addEventListener('touchend', e => {
    document.getElementById('hint0').classList.remove('visible');
    document.getElementById('hint1').classList.remove('visible');
    if (!dragging) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (currentScreen === 0 && dx < -SWIPE_THRESHOLD) goToScreen(1);
    else if (currentScreen === 1 && dx > SWIPE_THRESHOLD) goToScreen(0);
    else goToScreen(currentScreen); // snap back
    dragging = false;
  }, { passive: true });
});

// Also allow mouse drag for desktop testing
let mouseDown = false, mouseStartX = 0, mouseDragging = false;
wrapper.addEventListener('mousedown', e => {
  if (document.getElementById('commentVideoFeedLayer').classList.contains('open')) return;
  if (e.target.closest('.actions,.bottom-nav,.top-nav,.sec-top-nav')) return;
  mouseDown = true; mouseStartX = e.clientX; mouseDragging = false;
});
window.addEventListener('mousemove', e => {
  if (!mouseDown) return;
  const dx = e.clientX - mouseStartX;
  if (Math.abs(dx) > 8) {
    mouseDragging = true;
    const base = currentScreen === 0 ? 0 : -50;
    const pct = (dx / (wrapper.parentElement.offsetWidth * 2)) * 100;
    wrapper.classList.add('no-transition');
    wrapper.style.transform = `translateX(${base + pct}%)`;
  }
});
window.addEventListener('mouseup', e => {
  if (!mouseDown) return;
  mouseDown = false;
  if (!mouseDragging) return;
  const dx = e.clientX - mouseStartX;
  if (currentScreen === 0 && dx < -SWIPE_THRESHOLD) goToScreen(1);
  else if (currentScreen === 1 && dx > SWIPE_THRESHOLD) goToScreen(0);
  else goToScreen(currentScreen);
  mouseDragging = false;
});

function toggleLike(id, btn, e) {
  e.stopPropagation();
  currentLikes[id] = !currentLikes[id];
  const icon = btn.querySelector('.action-icon');
  icon.textContent = currentLikes[id] ? '❤️' : '🤍';
  btn.classList.toggle('liked', currentLikes[id]);
}

function doubleTapLike(id, e) {
  const heart = document.getElementById('heart-' + id);
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  heart.style.left = (e.clientX - rect.left) + 'px';
  heart.style.top  = (e.clientY - rect.top)  + 'px';
  heart.classList.remove('animate');
  void heart.offsetWidth;
  heart.classList.add('animate');
  if (!currentLikes[id]) {
    currentLikes[id] = true;
    const icon = document.querySelector(`#like-btn-${id} .action-icon`);
    if (icon) icon.textContent = '❤️';
  }
}

function toggleFollow(btn, e) {
  e.stopPropagation();
  if (btn.textContent === '＋') { btn.textContent = '✓'; btn.style.background = '#888'; }
  else { btn.textContent = '＋'; btn.style.background = '#fe2c55'; }
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

        <div class="comment-item">
          <div class="comment-avatar">😊</div>
          <div class="comment-body">
            <div class="comment-name">${who}</div>
            ${cap ? `<div class="comment-text">${cap}</div>` : ''}
            <div class="comment-video-wrap">
              <video src="${c.videoSrc}" playsinline controls preload="metadata"></video>
              <div class="video-comment-badge">视频评论</div>
            </div>
            <div class="comment-footer">
              <span class="comment-time">${c.time}</span>
              <span class="comment-like">❤️ 0</span>
            </div>
          </div>
        </div>`;
    }
    return `
      <div class="comment-item">
        <div class="comment-avatar">${c.avatar}</div>
        <div class="comment-body">
          <div class="comment-name">${c.name}</div>
          <div class="comment-text">${c.text}</div>
          <div class="comment-footer">
            <span class="comment-time">${c.time}</span>
            <span class="comment-like">❤️ ${c.likes}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function sendComment() {
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if (!text) return;
  if (!commentStore[currentCardId]) commentStore[currentCardId] = [...sampleComments];
  commentStore[currentCardId].unshift({ avatar:'😊', name:'我', text, time:'刚刚', likes:'0' });
  renderComments();
  input.value = '';
  document.getElementById('commentsList').scrollTop = 0;
}

/* ═══════════════════════════════════════════════════
   VIDEO COMMENT UPLOAD
═══════════════════════════════════════════════════ */
function triggerVideoUpload() {
  document.getElementById('videoFileInput').click();
}

document.getElementById('videoFileInput').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  if (pendingVideoURL) URL.revokeObjectURL(pendingVideoURL);
  pendingVideoBlob = file;
  pendingVideoURL = URL.createObjectURL(file);

  const previewVid = document.getElementById('previewVideo');
  previewVid.src = pendingVideoURL;
  previewVid.load();
  document.getElementById('previewCaption').value = '';
  document.getElementById('videoPreviewModal').classList.add('show');
  this.value = '';
});

function cancelVideoUpload() {
  document.getElementById('videoPreviewModal').classList.remove('show');
  document.getElementById('previewVideo').src = '';
  if (pendingVideoURL) { URL.revokeObjectURL(pendingVideoURL); pendingVideoURL = null; }
  pendingVideoBlob = null;
}

function confirmVideoUpload() {
  if (!pendingVideoURL || !currentCardId) return;
  const caption = document.getElementById('previewCaption').value.trim();
  if (!commentStore[currentCardId]) commentStore[currentCardId] = [...sampleComments];
  const cvId = 'cv-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
  commentStore[currentCardId].unshift({
    type: 'video',
    cvId,
    videoSrc: pendingVideoURL,
    caption,
    time: '刚刚',
    displayUser: '我',
  });
  pendingVideoURL = null;
  pendingVideoBlob = null;
  renderComments();
  document.getElementById('commentsList').scrollTop = 0;
  document.getElementById('videoPreviewModal').classList.remove('show');

  // flash upload button
  const btn = document.getElementById('uploadVideoBtn');
  btn.classList.add('uploading');
  btn.textContent = '✅';
  setTimeout(() => { btn.classList.remove('uploading'); btn.textContent = '📹'; }, 1500);
}

/* ═══════════════════════════════════════════════════
   NAV HELPERS
═══════════════════════════════════════════════════ */
function switchTab(el) {
  document.querySelectorAll('.top-nav .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
function switchNav(el) {
  el.closest('.screen').querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

/* ═══════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════ */
buildFeed('feed0', mainVideos);
buildFeed('feed1', secondaryVideos);
goToScreen(0);

document.getElementById('commentInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendComment();
});

/* ═══════════════════════════════════════════════════
   COMMENTS SHEET: swipe LEFT → fullscreen comment-video feed
═══════════════════════════════════════════════════ */
(function setupCommentSheetSwipe() {
  const sheet = document.getElementById('commentsSheet');
  const previewModal = document.getElementById('videoPreviewModal');

  sheet.addEventListener('touchstart', e => {
    if (!sheet.classList.contains('open')) return;
    if (previewModal.classList.contains('show')) return;
    sheetTouchX = e.touches[0].clientX;
    sheetTouchY = e.touches[0].clientY;
    sheetAxis = null;
    sheetDragging = false;
  }, { passive: true });

  sheet.addEventListener('touchmove', e => {
    if (!sheet.classList.contains('open')) return;
    if (previewModal.classList.contains('show')) return;
    const dx = e.touches[0].clientX - sheetTouchX;
    const dy = e.touches[0].clientY - sheetTouchY;
    if (!sheetAxis) {
      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        sheetAxis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }
    if (sheetAxis === 'h' && dx < -20) {
      e.preventDefault();
      sheetDragging = true;
    }
  }, { passive: false });

  sheet.addEventListener('touchend', e => {
    if (!sheet.classList.contains('open')) return;
    const dx = e.changedTouches[0].clientX - sheetTouchX;
    if (sheetAxis === 'h' && dx < -SHEET_SWIPE_THRESHOLD) {
      openCommentVideoFeed();
    }
    sheetAxis = null;
    sheetDragging = false;
  }, { passive: true });

  let sheetMouseDown = false, sheetMouseStartX = 0;
  sheet.addEventListener('mousedown', e => {
    if (!sheet.classList.contains('open')) return;
    if (previewModal.classList.contains('show')) return;
    if (e.target.closest('input,textarea,video,.send-btn,.upload-video-btn,.sheet-close')) return;
    sheetMouseDown = true;
    sheetMouseStartX = e.clientX;
  });
  window.addEventListener('mouseup', e => {
    if (!sheetMouseDown) return;
    sheetMouseDown = false;
    if (!sheet.classList.contains('open')) return;
    const dx = e.clientX - sheetMouseStartX;
    if (dx < -SHEET_SWIPE_THRESHOLD) openCommentVideoFeed();
  });
})();

/* ═══════════════════════════════════════════════════
   COMMENT-VIDEO LAYER: swipe RIGHT → back to comments sheet
═══════════════════════════════════════════════════ */
(function setupCommentVideoLayerSwipe() {
  const layer = document.getElementById('commentVideoFeedLayer');
  const hint = document.getElementById('cvSwipeHint');

  layer.addEventListener('touchstart', e => {
    if (!layer.classList.contains('open')) return;
    cvTouchX = e.touches[0].clientX;
    cvTouchY = e.touches[0].clientY;
    cvAxis = null;
    cvDragging = false;
  }, { passive: true });

  layer.addEventListener('touchmove', e => {
    if (!layer.classList.contains('open')) return;
    const dx = e.touches[0].clientX - cvTouchX;
    const dy = e.touches[0].clientY - cvTouchY;
    if (!cvAxis) {
      if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        cvAxis = Math.abs(dx) > Math.abs(dy) ? 'h' : 'v';
      }
    }
    if (cvAxis === 'h' && dx > 25) {
      e.preventDefault();
      cvDragging = true;
      hint.classList.add('visible');
    }
  }, { passive: false });

  layer.addEventListener('touchend', e => {
    hint.classList.remove('visible');
    if (!layer.classList.contains('open')) return;
    const dx = e.changedTouches[0].clientX - cvTouchX;
    if (cvAxis === 'h' && dx > SHEET_SWIPE_THRESHOLD) {
      closeCommentVideoFeed();
    }
    cvAxis = null;
    cvDragging = false;
  }, { passive: true });

  let cvMouseDown = false, cvMouseStartX = 0;
  layer.addEventListener('mousedown', e => {
    if (!layer.classList.contains('open')) return;
    if (e.target.closest('.top-nav,.bottom-nav,video,.action-btn')) return;
    cvMouseDown = true;
    cvMouseStartX = e.clientX;
  });
  window.addEventListener('mouseup', e => {
    if (!cvMouseDown) return;
    cvMouseDown = false;
    if (!layer.classList.contains('open')) return;
    const dx = e.clientX - cvMouseStartX;
    if (dx > SHEET_SWIPE_THRESHOLD) closeCommentVideoFeed();
  });
})();
</script>
